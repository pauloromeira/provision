---
- name: Pipx > Install dependencies (Debian)
  apt:
    name: "{{ item }}"
    state: present
  loop:
    - python3
    - python3-pip
    - python3-venv
  when: ansible_facts.pkg_mgr == "apt"

- name: Pipx > Install dependencies (Fedora)
  dnf:
    name: "{{ item }}"
    state: present
  loop:
    - python3
    - python3-pip
  when: ansible_facts.pkg_mgr == "dnf"

- name: Pipx > Install
  package:
    name: pipx
    state: present

- name: Pipx > Install packages
  become_user: "{{ user_id }}"
  community.general.pipx:
    name: "{{ item }}"
  loop:
    - bpytop
    - eg
    - flake8
    - ipython
    - magic-wormhole
    - mitmproxy
    - notebook
    - ranger-fm
    - rich-cli
    - shell-functools
    - tmuxp
    - tox
    - yt-dlp
    - tldr  # similar to eg

- name: Pipx > Inject into ipython
  become_user: "{{ user_id }}"
  community.general.pipx:
    name: ipython
    inject_packages: "{{ item }}"
    state: inject
  loop:
    - arrow
    - boltons
    - faker
    - ipdb
    - jmespath
    - openpyxl
    - pandas
    - parsel
    - python-slugify
    - requests
    - tenacity
